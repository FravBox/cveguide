<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docs</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css" />
    <style>
      /* prevent sidebar TOC from collapsing */
      .sidebar-nav ul { display: block !important; }

      /* bold h1 items in sidebar TOC */
      .sidebar-nav a.is-h1 {
        font-weight: bold;
      }

      .markdown-section strong {
        color: inherit;
        font-size: larger;
      }

      .markdown-section em {
        color: inherit;
      }

      .markdown-section code {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div id="app">Please wait...</div>
    <script>
      window.$docsify = {
        name: "Docs",
        relativePath: true,
        loadSidebar: true,
        subMaxLevel: 3,
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
        },
        auto2top: true,
        // docsify-copy-code
        copyCode: {
          buttonText: "⧉",
          errorText: "Error",
          successText: "Copied",
        },
        // for search
        search: {
          maxAge: 86400000, // Expiration time, the default one day
          paths: "auto",
          placeholder: "Text search",
        },
        noData: "No Results",
        depth: 6,
        hideOtherSidebarContent: false,
      };
    </script>

<!-- prevent active TOC items from collapsing -->
<script>
  window.$docsify = window.$docsify || {};
  (function () {
    const _doneEach = window.$docsify.doneEach;
    window.$docsify.doneEach = function (hook, vm) {
      if (_doneEach) _doneEach(hook, vm);
      hook.doneEach(function () {
        document.querySelectorAll('.sidebar-nav ul').forEach(function (ul) {
          ul.setAttribute('open', '');
        });
      });
    };
  })();
</script>

<!-- -# renders as smaller text -->
<script>
  window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
    hook.beforeEach(function(content) {
      return content.replace(/^-# (.+)$/gm, '<small class="subtitle">$1</small>');
    });
  });
</script>
<!-- load docsify -->
<script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>

<!-- bold sidebar TOC links that correspond to h1s -->
<script>
  window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
    hook.doneEach(function() {
      document.querySelectorAll('.sidebar-nav .is-h1').forEach(function(el) {
        el.classList.remove('is-h1');
      });

      const pagePath = window.location.hash.split('?')[0];

      document.querySelectorAll('.markdown-section h1').forEach(function(h1) {
        if (!h1.id) return;
        const link = document.querySelector(
          '.sidebar-nav a[href="' + pagePath + '?id=' + h1.id + '"]'
        );
        if (link) link.classList.add('is-h1');
      });
    });
  });
</script>

<!-- plugins -->
    <script src="https://unpkg.com/@h-hg/docsify-image-caption/dist/docsify-image-caption.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-interactive-checkboxes/dist/plugin.min.js"></script>
    <script src="https://unpkg.com/docsify-copy-code"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  </body>
</html>
