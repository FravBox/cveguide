<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Vid Events Guide</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css" />
    <style>
      /* prevent sidebar TOC from collapsing */
      .sidebar-nav ul { 
      display: block !important; 
      }

      /* bold h1 items in sidebar TOC */
      .sidebar-nav a.is-h1 {
        font-weight: bold;
      }
      
      .markdown-section strong {
        color: inherit;
        font-size: larger;
      }
      .markdown-section em {
        color: inherit;
      }
      .markdown-section code {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div id="app">Please wait...</div>
    <script>
      window.$docsify = {
        name: "Community Vid Events Guide",
        relativePath: true,
        loadSidebar: true,
        subMaxLevel: 3,
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
        },
        auto2top: true,
        // docsify-copy-code
        copyCode: {
          buttonText: "⧉",
          errorText: "Error",
          successText: "Copied",
        },
        // for search
        search: {
          maxAge: 86400000, // Expiration time, the default one day
          paths: "auto",
          placeholder: "Text search",
        },
        noData: "No Results",
        depth: 6,
        hideOtherSidebarContent: false,
      };
    </script>

<!-- prevent active TOC items from collapsing -->
<script>
  window.$docsify = window.$docsify || {};
  (function () {
    const _doneEach = window.$docsify.doneEach;
    window.$docsify.doneEach = function (hook, vm) {
      if (_doneEach) _doneEach(hook, vm);

      hook.doneEach(function () {
        document.querySelectorAll('.sidebar-nav ul').forEach(function (ul) {
          ul.setAttribute('open', '');
        });
      });
    };
  })();
</script>

<!-- -# renders as smaller text -->
<script>
  window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
    hook.beforeEach(function(content) {
      return content.replace(/^-# (.+)$/gm, '<small class="subtitle">$1</small>');
    });
  });
</script>

<!-- __text__ renders as underlined -->
<script>
  window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
    hook.beforeEach(function(content) {
      return content.replace(/__([^_]+)__/g, '<u>$1</u>');
    });
  });
</script>

<!-- force sidebar re-navigation when clicking current page's link -->
<script>
  window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
    let listenerAdded = false;

    hook.doneEach(function() {
      if (listenerAdded) return;
      listenerAdded = true;

      const sidebar = document.querySelector('.sidebar');
      if (!sidebar) return;

      sidebar.addEventListener('click', function(e) {
        const link = e.target.closest('a');
        if (!link) return;

        const href = link.getAttribute('href');
        if (!href) return;

        const targetHash = href.startsWith('#') ? href : '#' + href;

        if (window.location.hash === targetHash) {
          e.preventDefault();
          // Silently wipe the hash (no hashchange fires) then set it again
          history.replaceState(null, '', window.location.pathname + window.location.search);
          window.location.hash = targetHash;
        }
      });
    });
  });
</script>

<!-- load docsify -->
<script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>

<!-- bold sidebar TOC links that correspond to h1s -->
<script>
  window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
    hook.doneEach(function() {
      document.querySelectorAll('.sidebar-nav a').forEach(function(a) {
        var isH1 = !(a.getAttribute('href') || '').includes('?id=');
        a.classList.toggle('is-h1', isH1);
      });
    });
  });
</script>

<!-- plugins -->
    <script src="https://unpkg.com/@h-hg/docsify-image-caption/dist/docsify-image-caption.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-interactive-checkboxes/dist/plugin.min.js"></script>
    <script src="https://unpkg.com/docsify-copy-code"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  </body>
</html>
