<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/docute@4/dist/docute.css" />
  </head>
  <body>
    <div id="docute"></div>
    <script src="https://unpkg.com/docute@4/dist/docute.js"></script>
    <script>
      new Docute({
        target: '#docute',

        // Default dark theme with a toggle button in the header
        theme: 'dark',
        darkThemeToggler: true,

        sidebar: [
          {
            title: 'Contents',
            // collapsable: true is the default — gives each section the expand/collapse arrow
            toc: true, // automatically adds header links as sub-items for the active page
            children: [
              { title: 'Welcome',                  link: '/'          },
              { title: 'Community considerations', link: '/community' },
              { title: 'Tools & Subscriptions',    link: '/tools'     },
              { title: 'Technicals',               link: '/tech'      },
              { title: 'Schedule & To Do Lists',   link: '/schedule'  },
            ]
          }
        ],
      })
    </script>
  </body>
</html>
